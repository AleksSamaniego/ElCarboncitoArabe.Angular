<div class="categories-catalog-container">
  <div class="page-header">
    <mat-icon class="header-icon">category</mat-icon>
    <h1 class="page-title">Categorias</h1>
    <button
      mat-raised-button
      color="primary"
      class="add-btn"
      (click)="openAddDialog()"
      [disabled]="isSaving(null)"
    >
      <mat-icon>add</mat-icon>
      Agregar categoria
    </button>
  </div>

  <div *ngIf="loading" class="loading-container">
    <mat-progress-spinner
      mode="indeterminate"
      diameter="48"
    ></mat-progress-spinner>
    <p>Cargando categorias...</p>
  </div>

  <div *ngIf="!loading">
    <p *ngIf="categories.length === 0" class="empty-state">
      <mat-icon>inbox</mat-icon>
      No hay categorias registradas
    </p>

    <div *ngIf="categories.length > 0" class="table-wrapper">
      <table mat-table [dataSource]="categories" class="categories-table">
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Nombre</th>
          <td mat-cell *matCellDef="let row">
            <span class="category-name">{{ $any(row).name }}</span>
          </td>
        </ng-container>

        <ng-container matColumnDef="sortOrder">
          <th mat-header-cell *matHeaderCellDef>Orden</th>
          <td mat-cell *matCellDef="let row">{{ $any(row).sortOrder }}</td>
        </ng-container>

        <ng-container matColumnDef="active">
          <th mat-header-cell *matHeaderCellDef>Activa</th>
          <td mat-cell *matCellDef="let row">
            <span
              class="active-chip"
              [ngClass]="$any(row).isActive ? 'active-yes' : 'active-no'"
            >
              {{ $any(row).isActive ? "Si" : "No" }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Acciones</th>
          <td mat-cell *matCellDef="let row">
            <button
              mat-icon-button
              color="primary"
              matTooltip="Editar categoria"
              [disabled]="isSaving($any(row).id)"
              (click)="openEditDialog($any(row))"
            >
              <mat-icon>edit</mat-icon>
            </button>
            <button
              mat-icon-button
              color="warn"
              matTooltip="Desactivar categoria"
              [disabled]="isSaving($any(row).id)"
              (click)="deleteCategory($any(row))"
            >
              <mat-icon>block</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr
          mat-row
          *matRowDef="let row; columns: displayedColumns"
          class="category-row"
        ></tr>
      </table>
    </div>
  </div>
</div>
