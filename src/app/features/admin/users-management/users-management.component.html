<div class="users-container">
  <div class="users-header">
    <h1>Gestión de Usuarios</h1>
    <button mat-raised-button color="primary" (click)="openAddDialog()">
      <mat-icon>person_add</mat-icon>
      Agregar Usuario
    </button>
  </div>

  <mat-progress-spinner
    *ngIf="loading"
    diameter="50"
    mode="indeterminate"
  ></mat-progress-spinner>

  <table mat-table [dataSource]="users" class="users-table" *ngIf="!loading">
    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef>Nombre</th>
      <td mat-cell *matCellDef="let element">
        {{ element.name }}
      </td>
    </ng-container>

    <!-- Email Column -->
    <ng-container matColumnDef="email">
      <th mat-header-cell *matHeaderCellDef>Email</th>
      <td mat-cell *matCellDef="let element">
        {{ element.email }}
      </td>
    </ng-container>

    <!-- Role Column -->
    <ng-container matColumnDef="role">
      <th mat-header-cell *matHeaderCellDef>Rol</th>
      <td mat-cell *matCellDef="let element">
        <mat-chip>{{ element.role }}</mat-chip>
      </td>
    </ng-container>

    <!-- Active Column -->
    <ng-container matColumnDef="active">
      <th mat-header-cell *matHeaderCellDef>Activo</th>
      <td mat-cell *matCellDef="let element">
        <mat-icon
          [class.active]="element.isActive"
          [class.inactive]="!element.isActive"
        >
          {{ element.isActive ? "check_circle" : "cancel" }}
        </mat-icon>
      </td>
    </ng-container>

    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Acciones</th>
      <td mat-cell *matCellDef="let element">
        <button
          mat-icon-button
          (click)="openEditDialog(element)"
          [disabled]="isSaving(element.id)"
          matTooltip="Editar"
        >
          <mat-icon>edit</mat-icon>
        </button>
        <button
          mat-icon-button
          (click)="deleteUser(element)"
          [disabled]="isSaving(element.id)"
          color="warn"
          matTooltip="Eliminar"
        >
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>

  <div *ngIf="!loading && users.length === 0" class="empty-state">
    <mat-icon>people_outline</mat-icon>
    <p>No hay usuarios registrados</p>
  </div>
</div>
