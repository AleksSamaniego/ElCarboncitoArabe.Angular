<div class="login-container">
  <mat-card class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer circle -->
        <circle
          cx="100"
          cy="100"
          r="95"
          fill="none"
          stroke="#D32F2F"
          stroke-width="8"
        />
        <circle
          cx="100"
          cy="100"
          r="88"
          fill="none"
          stroke="#D32F2F"
          stroke-width="3"
        />

        <!-- Fire -->
        <path
          d="M 100 50 Q 90 70 95 90 L 105 90 Q 110 70 100 50"
          fill="#FFC107"
        />
        <path
          d="M 100 60 Q 95 75 98 90 L 102 90 Q 105 75 100 60"
          fill="#FF8C00"
        />

        <!-- Coals/Tacos -->
        <path
          d="M 60 130 Q 65 125 70 130 Q 65 135 60 130"
          fill="#D32F2F"
          opacity="0.7"
        />
        <path
          d="M 130 130 Q 135 125 140 130 Q 135 135 130 130"
          fill="#D32F2F"
          opacity="0.7"
        />
        <path
          d="M 100 145 Q 105 140 110 145 Q 105 150 100 145"
          fill="#D32F2F"
          opacity="0.7"
        />

        <!-- Text -->
        <text
          x="100"
          y="170"
          font-size="14"
          font-weight="bold"
          text-anchor="middle"
          fill="#D32F2F"
        >
          TAQUERÍA
        </text>
      </svg>
    </div>

    <mat-card-header>
      <mat-card-title>El Carboncito Árabe</mat-card-title>
      <mat-card-subtitle>Inicia sesión para continuar</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Correo electrónico</mat-label>
          <input matInput type="email" formControlName="email" autocomplete="email" />
          <mat-icon matSuffix>email</mat-icon>
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
            El correo es requerido
          </mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
            Ingresa un correo válido
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Contraseña</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
          <mat-icon matSuffix>lock</mat-icon>
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            La contraseña es requerida
          </mat-error>
        </mat-form-field>

        <p *ngIf="error" class="login-error">{{ error }}</p>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="loading"
          class="full-width">
          {{ loading ? 'Iniciando sesión...' : 'Iniciar sesión' }}
        </button>
      </form>
    </mat-card-content>
  </mat-card>
</div>
