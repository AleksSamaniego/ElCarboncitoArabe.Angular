<mat-sidenav-container class="shell-container">
  <mat-sidenav
    #sidenav
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="!(isHandset$ | async)"
    class="shell-sidenav">
    <mat-toolbar color="primary" class="sidenav-header">
      <mat-icon>restaurant</mat-icon>
      <span class="sidenav-title">El Carboncito</span>
    </mat-toolbar>
    <mat-nav-list *ngIf="currentUser$ | async as user">
      <a
        mat-list-item
        routerLink="/waiter"
        routerLinkActive="active-link"
        *ngIf="hasRole(user, 'Waiter', 'Owner')">
        <mat-icon matListItemIcon>table_restaurant</mat-icon>
        <span matListItemTitle>Mesero</span>
      </a>
      <a
        mat-list-item
        routerLink="/kitchen"
        routerLinkActive="active-link"
        *ngIf="hasRole(user, 'Kitchen', 'Owner')">
        <mat-icon matListItemIcon>soup_kitchen</mat-icon>
        <span matListItemTitle>Cocina</span>
      </a>
      <a
        mat-list-item
        routerLink="/admin"
        routerLinkActive="active-link"
        *ngIf="hasRole(user, 'Owner')">
        <mat-icon matListItemIcon>admin_panel_settings</mat-icon>
        <span matListItemTitle>Administración</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content class="shell-content">
    <mat-toolbar color="primary" class="shell-toolbar">
      <button mat-icon-button (click)="sidenav.toggle()" aria-label="Alternar menú">
        <mat-icon>menu</mat-icon>
      </button>
      <span class="toolbar-spacer"></span>
      <ng-container *ngIf="currentUser$ | async as user">
        <span class="username">{{ user.username }}</span>
        <button
          mat-icon-button
          (click)="logout()"
          aria-label="Cerrar sesión"
          matTooltip="Cerrar sesión">
          <mat-icon>logout</mat-icon>
        </button>
      </ng-container>
    </mat-toolbar>

    <div class="shell-main">
      <router-outlet></router-outlet>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
